<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMS Admin Panel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;min-height:100vh;color:#1a1a1a}
.topbar{background:#1F4E79;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{color:#fff;font-size:15px;font-weight:600}
.topbar .right{display:flex;align-items:center;gap:10px}
.badge{background:rgba(255,255,255,0.15);color:#fff;padding:5px 12px;border-radius:99px;font-size:12px}
.logout{background:transparent;border:1px solid rgba(255,255,255,0.4);color:#fff;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.screen{display:none;max-width:960px;margin:28px auto;padding:0 16px 48px}
.screen.active{display:block}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,0.08);overflow:hidden;margin-bottom:16px}
.card-header{background:#1F4E79;padding:16px 20px}
.card-header h2{color:#fff;font-size:16px;font-weight:600}
.card-body{padding:20px}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo .org{font-size:20px;font-weight:700;color:#1F4E79}
.login-logo .sub{font-size:12px;color:#888;margin-top:3px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:5px}
.field input,.field select{width:100%;padding:9px 12px;border:1.5px solid #e0e0e0;border-radius:7px;font-size:13px}
.field input:focus,.field select:focus{outline:none;border-color:#2E75B6}
.btn{padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid #e0e0e0;background:#fff;color:#333}
.btn:hover{background:#f5f5f5}
.btn-primary{background:#1F4E79;color:#fff;border-color:#1F4E79}
.btn-primary:hover{background:#16396b}
.btn-danger{background:#C00000;color:#fff;border-color:#C00000}
.btn-danger:hover{background:#a00000}
.btn-sm{padding:5px 12px;font-size:12px}
.login-btn{width:100%;padding:13px;background:#1F4E79;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
/* System tabs */
.sys-tabs{display:flex;gap:0;margin-bottom:20px;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.sys-tab{flex:1;padding:14px;text-align:center;cursor:pointer;background:#fff;font-size:14px;font-weight:600;color:#888;border:1.5px solid #e0e0e0;transition:all 0.15s}
.sys-tab:first-child{border-right:none;border-radius:10px 0 0 10px}
.sys-tab:last-child{border-radius:0 10px 10px 0}
.sys-tab.active{background:#1F4E79;color:#fff;border-color:#1F4E79}
/* Inner tabs */
.tabs{display:flex;border-bottom:1px solid #e8edf2;margin-bottom:20px}
.tab{padding:10px 18px;font-size:13px;color:#888;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#1F4E79;border-bottom-color:#1F4E79;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;background:#1F4E79;color:#fff;font-weight:600;font-size:12px}
td{padding:9px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
.tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;background:#D6E4F0;color:#1F4E79}
.tag-green{background:#E2EFDA;color:#375623}
.error-banner{background:#FCE4D6;color:#C00000;padding:10px 14px;border-radius:7px;font-size:12px;margin-bottom:14px;display:none}
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center}
.modal-bg.active{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:600;color:#1F4E79;margin-bottom:16px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid #e8edf2}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.search-bar{padding:9px 14px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:13px;margin-bottom:14px;width:100%;max-width:320px}
.search-bar:focus{outline:none;border-color:#2E75B6}
.loading{text-align:center;padding:32px;color:#888;font-size:13px}
.spinner{width:28px;height:28px;border:3px solid #e0e0e0;border-top-color:#1F4E79;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:11px 20px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:600px){.two-col{grid-template-columns:1fr}}
</style>
</head>

<div class="topbar">
  <h1>PMS Admin Panel &mdash; Raigad &amp; MRIPL HO</h1>
  <div class="right">

      <div class="card-header"><h2>Admin Login</h2></div>
      <div class="card-body">
        <div class="field"><label>Admin Password</label><input type="password" id="admin-pwd" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')adminLogin()"></div>
        <div class="error-banner" id="login-err">Incorrect password.</div>
        <button class="login-btn" onclick="adminLogin()">Login</button>
      </div>
    </div>
    <p style="text-align:center;font-size:11px;color:#aaa;margin-top:12px">
      <a href="index.html" style="color:#aaa">← Raigad Review Form</a> &nbsp;|&nbsp;
      <a href="mripl.html" style="color:#aaa">MRIPL Review Form →</a>
    </p>
  </div>
</div>

<!-- MAIN -->
<div class="screen" id="screen-admin">

  </div>

  <!-- Content area -->
  <div id="system-content"></div>

</div>

<!-- EMPLOYEE MODAL -->
<div class="modal-bg" id="emp-modal">
  <div class="modal">
    <h3 id="emp-modal-title">Add Employee</h3>
    <input type="hidden" id="emp-edit-idx">
    <input type="hidden" id="emp-system">
    <div class="two-col">
      <div class="field"><label>Employee Code *</label><input type="number" id="emp-code" placeholder="e.g. 620"></div>
      <div class="field"><label>Full Name *</label><input type="text" id="emp-name" placeholder="Last First"></div>
    </div>
    <div class="field"><label>Role / Designation *</label><select id="emp-role" onchange="onRoleChange()"><option value="">Select role...</option></select></div>
    <div class="two-col">
      <div class="field"><label>Station / Department *</label><input type="text" id="emp-station" placeholder="e.g. Lower or Accounts"></div>
      <div class="field"><label>Group / Dept</label><input type="text" id="emp-group" readonly style="background:#f5f7fa;color:#888"></div>
    </div>
    <div class="field"><label>Supervisor / Reviewer *</label><select id="emp-supervisor"><option value="">Select...</option></select></div>
    <div class="error-banner" id="emp-modal-err"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('emp-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEmployee()">Save</button>
    </div>
  </div>
</div>

<!-- SUPERVISOR MODAL -->
<div class="modal-bg" id="sup-modal">
  <div class="modal">
    <h3 id="sup-modal-title">Add Supervisor</h3>
    <input type="hidden" id="sup-edit-name">
    <input type="hidden" id="sup-system">
    <div class="field"><label>Full Name *</label><input type="text" id="sup-name"></div>
    <div class="field"><label>Title / Designation *</label><input type="text" id="sup-title"></div>
    <div class="field"><label>Password *</label><input type="text" id="sup-pwd" placeholder="e.g. Raigad@XX"></div>
    <div class="error-banner" id="sup-modal-err"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('sup-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSupervisor()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let DATA={raigad:{employees:[],supervisors:{}},mripl:{employees:[],supervisors:{}}};
let filtered=[];

// ── AUTH ──────────────────────────────────────────────────────────
function adminLogin(){
  const pwd=document.getElementById('admin-pwd').value;
  if(pwd!==ADMIN_PASSWORD){document.getElementById('login-err').style.display='block';return;}
  document.getElementById('login-err').style.display='none';
  document.getElementById('admin-badge').style.display='';
  document.getElementById('admin-logout').style.display='';
  showScreen('screen-admin');
  loadBoth();
}
function adminLogout(){
  document.getElementById('admin-pwd').value='';
  document.getElementById('admin-badge').style.display='none';
  document.getElementById('admin-logout').style.display='none';
  showScreen('screen-login');
}

// ── LOAD BOTH SYSTEMS ─────────────────────────────────────────────
function loadBoth(){
  renderContent();
  // Load Raigad
  fetch(APPS_SCRIPT_URL+'?action=getConfig')
    .then(r=>r.json())
    .then(d=>{
      if(d.employees&&d.employees.length>0){DATA.raigad.employees=d.employees;DATA.raigad.supervisors=d.supervisors||{};}
      else{DATA.raigad=JSON.parse(JSON.stringify(RAIGAD_SEED));saveSystem('raigad');}
      filtered=DATA.raigad.employees;
      renderContent();
    }).catch(()=>{DATA.raigad=JSON.parse(JSON.stringify(RAIGAD_SEED));renderContent();});

  // Load MRIPL
  fetch(APPS_SCRIPT_URL+'?action=getConfig&client=mripl')
    .then(r=>r.json())
    .then(d=>{
      if(d.employees&&d.employees.length>0){DATA.mripl.employees=d.employees;DATA.mripl.supervisors=d.supervisors||{};}
      else{DATA.mripl=JSON.parse(JSON.stringify(MRIPL_SEED));saveSystem('mripl');}
      if(currentSystem==='mripl'){filtered=DATA.mripl.employees;renderContent();}
    }).catch(()=>{DATA.mripl=JSON.parse(JSON.stringify(MRIPL_SEED));if(currentSystem==='mripl')renderContent();});
}

// ── SWITCH SYSTEM ─────────────────────────────────────────────────
function switchSystem(sys){
  currentSystem=sys;
  document.getElementById('sys-raigad').className='sys-tab'+(sys==='raigad'?' active':'');
  document.getElementById('sys-mripl').className='sys-tab'+(sys==='mripl'?' active':'');
  filtered=[...DATA[sys].employees];
  document.getElementById('emp-search-input')&&(document.getElementById('emp-search-input').value='');
  renderContent();
}

// ── RENDER ────────────────────────────────────────────────────────
function renderContent(){
  const d=DATA[currentSystem];
  const sysLabel=currentSystem==='raigad'?'Raigad Ropeways':'MRIPL Head Office';
  document.getElementById('system-content').innerHTML=`
    <div class="tabs">
      <div class="tab active" id="inner-tab-emp">Employees (${d.employees.length})</div>
      <div class="tab" id="inner-tab-sup">Reviewers / Supervisors (${Object.keys(d.supervisors).length})</div>
    </div>
    <div id="inner-emp">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <input class="search-bar" id="emp-search-input" type="text" placeholder="Search name, role, department..." oninput="filterEmps(this.value)" style="margin-bottom:0">
        <button class="btn btn-primary" onclick="openAddEmployee()">+ Add Employee</button>
      </div>
      <div class="card"><table><thead><tr><th>Code</th><th>Name</th><th>Role</th><th>Dept / Station</th><th>Reviewer</th><th>Actions</th></tr></thead>
      <tbody id="emp-tbody">${renderEmpRows(filtered.length?filtered:d.employees,d.supervisors)}</tbody></table></div>
    </div>
    <div id="inner-sup" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <h3 style="font-size:14px;color:#555">Reviewers &amp; Passwords — ${sysLabel}</h3>
        <button class="btn btn-primary" onclick="openAddSupervisor()">+ Add Reviewer</button>
      </div>
      <div class="card"><table><thead><tr><th>Name</th><th>Title</th><th>Password</th><th>Team</th><th>Actions</th></tr></thead>
      <tbody>${renderSupRows(d.supervisors,d.employees)}</tbody></table></div>
    </div>`;

  document.getElementById('inner-tab-emp').onclick=()=>{document.getElementById('inner-emp').style.display='';document.getElementById('inner-sup').style.display='none';document.getElementById('inner-tab-emp').className='tab active';document.getElementById('inner-tab-sup').className='tab';};
  document.getElementById('inner-tab-sup').onclick=()=>{document.getElementById('inner-sup').style.display='';document.getElementById('inner-emp').style.display='none';document.getElementById('inner-tab-sup').className='tab active';document.getElementById('inner-tab-emp').className='tab';};
}

function renderEmpRows(emps,sups){
  if(!emps.length)return'<tr><td colspan="6" style="text-align:center;color:#888;padding:20px">No employees found</td></tr>';
  return emps.map((e,i)=>{
    const actualIdx=DATA[currentSystem].employees.indexOf(e);
    const sup=Object.entries(sups).find(([,v])=>v.team&&v.team.includes(e.code));
    const supName=sup?sup[0]:'<span style="color:#C00000">Unassigned</span>';
    return`<tr><td><span class="tag">${e.code}</span></td><td><strong>${e.name}</strong></td><td style="font-size:12px;color:#555">${e.role}</td><td style="font-size:12px">${e.station||e.group||''}</td><td style="font-size:12px">${supName}</td><td><button class="btn btn-sm" onclick="openEditEmployee(${actualIdx})" style="margin-right:6px">Edit</button><button class="btn btn-sm btn-danger" onclick="deleteEmployee(${actualIdx})">Delete</button></td></tr>`;
  }).join('');
}

function renderSupRows(sups,emps){
  const entries=Object.entries(sups);
  if(!entries.length)return'<tr><td colspan="5" style="text-align:center;color:#888;padding:20px">No reviewers found</td></tr>';
  return entries.map(([name,info])=>`<tr><td><strong>${name}</strong></td><td style="font-size:12px;color:#555">${info.title||''}</td><td><code style="background:#f5f5f5;padding:2px 8px;border-radius:4px;font-size:12px">${info.pwd||''}</code></td><td><span class="tag">${(info.team||[]).length} employees</span></td><td><button class="btn btn-sm" onclick="openEditSupervisor('${name}')" style="margin-right:6px">Edit</button><button class="btn btn-sm btn-danger" onclick="deleteSupervisor('${name}')">Delete</button></td></tr>`).join('');
}

function filterEmps(q){
  const v=q.toLowerCase();
  const d=DATA[currentSystem];
  filtered=d.employees.filter(e=>e.name.toLowerCase().includes(v)||e.role.toLowerCase().includes(v)||String(e.code).includes(v)||(e.station||'').toLowerCase().includes(v)||(e.group||'').toLowerCase().includes(v));
  document.getElementById('emp-tbody').innerHTML=renderEmpRows(filtered,d.supervisors);
}

// ── ADD / EDIT EMPLOYEE ───────────────────────────────────────────
function openAddEmployee(){
  document.getElementById('emp-modal-title').textContent='Add Employee';
  document.getElementById('emp-edit-idx').value='';
  document.getElementById('emp-system').value=currentSystem;
  document.getElementById('emp-code').value='';
  document.getElementById('emp-name').value='';
  document.getElementById('emp-role').value='';
  document.getElementById('emp-group').value='';
  document.getElementById('emp-station').value='';
  document.getElementById('emp-supervisor').value='';
  document.getElementById('emp-modal-err').style.display='none';
  populateRoleDropdown();
  populateSupDropdown();
  document.getElementById('emp-modal').classList.add('active');
}

function openEditEmployee(idx){
  const e=DATA[currentSystem].employees[idx];
  document.getElementById('emp-modal-title').textContent='Edit Employee';
  document.getElementById('emp-edit-idx').value=idx;
  document.getElementById('emp-system').value=currentSystem;
  document.getElementById('emp-code').value=e.code;
  document.getElementById('emp-name').value=e.name;
  populateRoleDropdown();
  document.getElementById('emp-role').value=e.role;
  document.getElementById('emp-group').value=e.group||'';
  document.getElementById('emp-station').value=e.station||'';
  populateSupDropdown();
  const sup=Object.entries(DATA[currentSystem].supervisors).find(([,v])=>v.team&&v.team.includes(e.code));
  document.getElementById('emp-supervisor').value=sup?sup[0]:'';
  document.getElementById('emp-modal-err').style.display='none';
  document.getElementById('emp-modal').classList.add('active');
}

function populateRoleDropdown(){
  const roles=currentSystem==='raigad'?RAIGAD_ROLES:MRIPL_ROLES;
  const sel=document.getElementById('emp-role');
  sel.innerHTML='<option value="">Select role...</option>';
  Object.keys(roles).sort().forEach(r=>sel.innerHTML+=`<option value="${r}">${r}</option>`);
}

function populateSupDropdown(){
  const sel=document.getElementById('emp-supervisor');
  sel.innerHTML='<option value="">Select reviewer...</option>';
  Object.keys(DATA[currentSystem].supervisors).sort().forEach(s=>sel.innerHTML+=`<option value="${s}">${s}</option>`);
}

function onRoleChange(){
  const roles=currentSystem==='raigad'?RAIGAD_ROLES:MRIPL_ROLES;
  document.getElementById('emp-group').value=roles[document.getElementById('emp-role').value]||'';
}

function saveEmployee(){
  const sys=document.getElementById('emp-system').value;
  const idx=document.getElementById('emp-edit-idx').value;
  const code=parseInt(document.getElementById('emp-code').value);
  const name=document.getElementById('emp-name').value.trim();
  const role=document.getElementById('emp-role').value;
  const station=document.getElementById('emp-station').value.trim();
  const roles=sys==='raigad'?RAIGAD_ROLES:MRIPL_ROLES;
  const group=roles[role]||document.getElementById('emp-group').value;
  const supervisor=document.getElementById('emp-supervisor').value;
  const errEl=document.getElementById('emp-modal-err');
  if(!code||!name||!role||!supervisor){errEl.textContent='Please fill in all required fields.';errEl.style.display='block';return;}
  const emp={code,name,role,group,station};
  const d=DATA[sys];
  if(idx===''){
    if(d.employees.find(e=>e.code===code)){errEl.textContent='Employee code already exists.';errEl.style.display='block';return;}
    d.employees.push(emp);
  } else {
    const oldCode=d.employees[parseInt(idx)].code;
    Object.values(d.supervisors).forEach(s=>{if(s.team)s.team=s.team.filter(c=>c!==oldCode);});
    d.employees[parseInt(idx)]=emp;
  }
  Object.values(d.supervisors).forEach(s=>{if(s.team)s.team=s.team.filter(c=>c!==code);});
  if(!d.supervisors[supervisor].team)d.supervisors[supervisor].team=[];
  d.supervisors[supervisor].team.push(code);
  filtered=[...d.employees];
  closeModal('emp-modal');
  renderContent();
  saveSystem(sys);
}

function deleteEmployee(idx){
  const e=DATA[currentSystem].employees[idx];
  if(!confirm(`Delete ${e.name}?`))return;
  Object.values(DATA[currentSystem].supervisors).forEach(s=>{if(s.team)s.team=s.team.filter(c=>c!==e.code);});
  DATA[currentSystem].employees.splice(idx,1);
  filtered=[...DATA[currentSystem].employees];
  renderContent();
  saveSystem(currentSystem);
}

// ── ADD / EDIT SUPERVISOR ─────────────────────────────────────────
function openAddSupervisor(){
  document.getElementById('sup-modal-title').textContent='Add Reviewer';
  document.getElementById('sup-edit-name').value='';
  document.getElementById('sup-system').value=currentSystem;
  document.getElementById('sup-name').value='';
  document.getElementById('sup-title').value='';
  document.getElementById('sup-pwd').value='';
  document.getElementById('sup-modal-err').style.display='none';
  document.getElementById('sup-modal').classList.add('active');
}

function openEditSupervisor(name){
  const s=DATA[currentSystem].supervisors[name];
  document.getElementById('sup-modal-title').textContent='Edit Reviewer';
  document.getElementById('sup-edit-name').value=name;
  document.getElementById('sup-system').value=currentSystem;
  document.getElementById('sup-name').value=name;
  document.getElementById('sup-title').value=s.title||'';
  document.getElementById('sup-pwd').value=s.pwd||'';
  document.getElementById('sup-modal-err').style.display='none';
  document.getElementById('sup-modal').classList.add('active');
}

function saveSupervisor(){
  const sys=document.getElementById('sup-system').value;
  const oldName=document.getElementById('sup-edit-name').value;
  const name=document.getElementById('sup-name').value.trim();
  const title=document.getElementById('sup-title').value.trim();
  const pwd=document.getElementById('sup-pwd').value.trim();
  const errEl=document.getElementById('sup-modal-err');
  if(!name||!title||!pwd){errEl.textContent='Please fill in all fields.';errEl.style.display='block';return;}
  const d=DATA[sys];
  if(oldName&&oldName!==name){const team=d.supervisors[oldName]?.team||[];delete d.supervisors[oldName];d.supervisors[name]={pwd,title,team};}
  else if(!oldName){d.supervisors[name]={pwd,title,team:[]};}
  else{d.supervisors[name].pwd=pwd;d.supervisors[name].title=title;}
  closeModal('sup-modal');
  renderContent();
  saveSystem(sys);
}

function deleteSupervisor(name){
  const size=DATA[currentSystem].supervisors[name]?.team?.length||0;
  if(!confirm(`Delete ${name}?${size>0?' Their '+size+' employees will become unassigned.':''}`))return;
  delete DATA[currentSystem].supervisors[name];
  renderContent();
  saveSystem(currentSystem);
}

// ── SAVE ──────────────────────────────────────────────────────────
function saveSystem(sys){
  showToast('Saving...');
  const payload={action:'saveConfig',employees:DATA[sys].employees,supervisors:DATA[sys].supervisors};
  if(sys==='mripl')payload.client='mripl';
  const url=APPS_SCRIPT_URL+'?data='+encodeURIComponent(JSON.stringify(payload));
  const img=new Image();
  img.onload=img.onerror=function(){showToast('Saved \u2713');};
  img.src=url;
}

// ── UTILS ─────────────────────────────────────────────────────────
function closeModal(id){document.getElementById(id).classList.remove('active');}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>
</body>
